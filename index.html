<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навигатор моего пути к цели</title>
    <style>
        :root {
            --bg: #f9f7f3;
            --card: #ffffff;
            --primary: #4a7c96;
            --primary-light: #e6f0f5;
            --accent: #c4946c;
            --accent-light: #fdf7f0;
            --text: #3a3a3a;
            --text-light: #7a7a7a;
            --border: #e8e4dd;
            --shadow: 0 2px 16px rgba(60, 40, 30, 0.06);
            --shadow-lg: 0 8px 32px rgba(60, 40, 30, 0.1);
            --green: #7a9a7e;
            --green-bg: #edf5ee;
            --amber: #c9a96e;
            --amber-bg: #fdf7ed;
            --red: #c47a7a;
            --red-bg: #fdf0f0;
            --blue: #6b8fad;
            --blue-bg: #eef4f8;
            --radius: 18px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-stack);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
        }

        /* Основной контейнер — адаптивный */
        .app-wrapper {
            width: 100%;
            max-width: 600px;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
        }

        @media (min-width: 640px) {
            .app-wrapper {
                margin: 20px auto;
                min-height: calc(100vh - 40px);
                border-radius: 24px;
                box-shadow: var(--shadow-lg);
                background: #fafaf8;
            }
            body {
                background: #f0ece6;
            }
        }

        .container {
            padding: 16px 20px 40px;
        }

        @media (min-width: 640px) {
            .container {
                padding: 24px 32px 60px;
            }
        }

        /* Типографика */
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        @media (min-width: 640px) {
            h1 { font-size: 26px; }
            h2 { font-size: 20px; }
            h3 { font-size: 16px; }
        }

        /* Карточки */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        @media (min-width: 640px) {
            .card {
                padding: 24px 22px;
                margin-bottom: 16px;
                border-radius: 20px;
            }
        }

        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 13px 24px;
            border-radius: 28px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: var(--font-stack);
            letter-spacing: 0.2px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-height: 48px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover { background: #3d6b83; }
        .btn-secondary {
            background: var(--primary-light);
            color: var(--primary);
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 20px;
            min-height: 38px;
        }
        .btn-block { width: 100%; margin-bottom: 8px; }
        .btn-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            padding: 0;
            font-size: 22px;
        }

        /* Поля ввода */
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
            margin-top: 14px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: var(--font-stack);
            background: #fafaf9;
            transition: border 0.2s, box-shadow 0.2s;
            resize: vertical;
            color: var(--text);
            -webkit-appearance: none;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 124, 150, 0.1);
            background: #fff;
        }
        textarea { min-height: 60px; }
        @media (min-width: 640px) {
            textarea { min-height: 80px; font-size: 16px; }
            input[type="text"] { font-size: 16px; }
        }

        /* Шкала */
        .scale-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 14px;
        }
        .scale-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text);
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
        }
        .scale-btn:hover { border-color: var(--primary); background: var(--primary-light); }
        .scale-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); transform: scale(1.1); }
        @media (min-width: 640px) {
            .scale-btn { width: 42px; height: 42px; font-size: 15px; }
        }

        /* Чувства */
        .feelings-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 14px;
        }
        .feeling-chip {
            padding: 8px 14px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font-stack);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .feeling-chip:hover { border-color: var(--primary); background: #f8fafb; }
        .feeling-chip.selected { background: var(--primary-light); border-color: var(--primary); color: var(--primary);
        font-weight: 600; }
        @media (min-width: 640px) {
            .feeling-chip { padding: 10px 16px; font-size: 14px; border-radius: 22px; }
        }

        /* Темп */
        .tempo-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 14px 0;
        }
        .tempo-card {
            background: #fff;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: var(--font-stack);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            display: block;
            width: 100%;
        }
        .tempo-card:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(74, 124, 150, 0.1); }
        .tempo-card.selected { border-color: var(--primary); background: var(--primary-light); }
        .tempo-icon { font-size: 32px; margin-bottom: 4px; display: block; }
        .tempo-title { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
        .tempo-desc { font-size: 13px; color: var(--text-light); line-height: 1.4; }
        @media (min-width: 640px) {
            .tempo-card { padding: 20px; }
            .tempo-title { font-size: 17px; }
        }

        /* Контейнер для тяжёлых чувств */
        .container-box {
            background: var(--accent-light);
            border: 2px solid #e8d5c0;
            border-radius: var(--radius);
            padding: 18px;
            margin: 12px 0;
        }
        .container-box h4 { font-size: 16px; margin-bottom: 6px; color: var(--accent); }
        .container-box p { font-size: 14px; color: #6b5b4e; margin-bottom: 6px; line-height: 1.5; }
        .container-box .note { font-style: italic; font-size: 13px; color: #8a7a6a; }

        /* Бейджи */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-amber { background: var(--amber-bg); color: var(--amber); }
        .badge-primary { background: var(--primary-light); color: var(--primary); }

        /* Прогресс */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e8e4dd;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #5b9ab5);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
        }

        /* ТРОПА — ГЛАВНЫЙ ЭКРАН */
        .trail-container {
            position: relative;
            padding: 20px 0;
        }
        .trail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .trail-wanderer {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        @media (min-width: 640px) {
            .trail-wanderer { width: 62px; height: 62px; font-size: 34px; }
        }
        .trail-info { flex: 1; }
        .trail-name { font-weight: 700; font-size: 17px; }
        .trail-goal { font-size: 12px; color: var(--text-light); line-height: 1.3; margin-top: 2px; }
        .trail-compass { font-size: 11px; color: var(--accent); margin-top: 3px; }

        /* Сетка шагов */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin: 16px 0;
        }
        @media (min-width: 640px) {
            .steps-grid { gap: 8px; }
        }
        .step-cell {
            aspect-ratio: 1;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 2px solid transparent;
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
            min-width: 0;
            background: #f0ece6;
            color: #bbb;
        }
        .step-cell.today {
            background: #fff;
            border-color: var(--primary);
            color: var(--primary);
            animation: pulse 2s infinite;
            font-size: 13px;
            font-weight: 700;
        }
        .step-cell.completed {
            background: var(--green-bg);
            border-color: var(--green);
            color: var(--green);
            cursor: pointer;
        }
        .step-cell.completed:hover { background: #d8ead6; }
        .step-cell.missed {
            background: #f5f2ed;
            border-color: #e0dcd5;
            color: #ccc;
            cursor: default;
        }
        .step-cell.future {
            background: #f8f6f3;
            border-color: #e8e4dd;
            color: #d5d0c8;
            cursor: default;
        }
        .step-cell.start {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            font-size: 18px;
            cursor: default;
        }
        .step-cell .day-num {
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 8px;
            font-weight: 400;
            opacity: 0.7;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(74, 124, 150, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(74, 124, 150, 0); }
        }

        /* Легенда */
        .legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }
        .legend-dot.green { background: var(--green-bg); border: 1.5px solid var(--green); }
        .legend-dot.blue { background: #fff; border: 1.5px solid var(--primary); }
        .legend-dot.gray { background: #f5f2ed; border: 1.5px solid #e0dcd5; }

        /* Итоги */
        .summary-section {
            margin: 10px 0;
            padding: 14px;
            background: #fafaf9;
            border-radius: var(--radius-sm);
        }
        .summary-section h4 { font-size: 14px; color: var(--primary); margin-bottom: 4px; }

        /* Возвращение */
        .return-banner {
            background: #fdf7ed;
            border: 2px solid #e8d5c0;
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            margin-bottom: 14px;
        }
        .return-banner h3 { color: var(--accent); margin-bottom: 4px; }

        /* Утилиты */
        .text-center { text-align: center; }
        .text-muted { color: var(--text-light); font-size: 13px; }
        .mt-8 { margin-top: 8px; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-12 { margin-bottom: 12px; }
        .mb-16 { margin-bottom: 16px; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
        .hidden { display: none !important; }
        .feelings-scroll { max-height: 180px; overflow-y: auto; padding-right: 4px; }

        /* Модалка */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px 20px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        @media (min-width: 640px) {
            .modal-content { padding: 28px 24px; }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d5d0c8; border-radius: 2px; }
    </style>
</head>

                gratitudeGarden: [],
                lastActiveDate: null,
                completedCycles: 0,
                sharingHistory: [],
                currentViewDay: null
            };
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try { const s = JSON.parse(raw); return { ...getDefaultState(), ...s }; } catch (e) {}
            }
            return getDefaultState();
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        let state = loadState();

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================

        function getTodayDayNumber() {
            if (!state.startDate) return 0;
            const start = new Date(state.startDate);
            const today = new Date();
            const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
            return Math.max(1, Math.min(TOTAL_DAYS, diff));
        }

        function getDaysSinceLastActive() {
            if (!state.lastActiveDate) return 0;
            const last = new Date(state.lastActiveDate);
            const today = new Date();
            return Math.floor((today - last) / (1000 * 60 * 60 * 24));
        }

        function getProgress() {
            const today = getTodayDayNumber();
            const completed = Object.keys(state.days).length;
            const total = TOTAL_DAYS;
            const remaining = Math.max(0, total - today);
            const percent = today > 0 ? Math.round((completed / today) * 100) : 0;
            return { total, completed, remaining, percent, today };
        }

        function getCurrentWeekNumber() {
            const today = getTodayDayNumber();
            return Math.ceil(today / 7);
        }

        function formatDate(dayNumber) {
            if (!state.startDate) return `День ${dayNumber}`;
            const start = new Date(state.startDate);
            start.setDate(start.getDate() + dayNumber - 1);
            const months = [
                'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
                'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'
            ];
            return `${start.getDate()} ${months[start.getMonth()]}`;
        }

        function getRandomPhrase(category) {
            const phrases = SUPPORT_PHRASES[category];
            return phrases[Math.floor(Math.random() * phrases.length)];
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== РЕНДЕРИНГ ====================

        function render() {
            const app = document.getElementById('app');
            state.lastActiveDate = new Date().toISOString().split('T')[0];
            saveState(state);

            // Проверка на возвращение после пропуска
            const daysAway = getDaysSinceLastActive();
            if (daysAway >= 3 && state.screen === 'trail' && state.startDate && getTodayDayNumber() > 1) {
                app.innerHTML = renderReturnScreen();
                attachListeners();
                return;
            }

            switch (state.screen) {
                case 'create_wanderer':
                    app.innerHTML = renderCreateWanderer();
                    break;
                case 'choose_tempo':
                    app.innerHTML = renderChooseTempo();
                    break;
                case 'set_goal':
                    app.innerHTML = renderSetGoal();
                    break;
                case 'set_values':
                    app.innerHTML = renderSetValues();
                    break;
                case 'trail':
                    app.innerHTML = renderTrail();
                    break;
                case 'daily_card':
                    app.innerHTML = renderDailyCard(state.currentViewDay || getTodayDayNumber());
                    break;
                case 'review_day':
                    app.innerHTML = renderReviewDay(state.currentViewDay);
                    break;
                case 'completed':
                    app.innerHTML = renderSummary();
                    break;
                default:
                    app.innerHTML = renderTrail();
            }

            attachListeners();
        }

        // ==================== ЭКРАНЫ ====================

        function renderCreateWanderer() {
            const hasHistory = state.completedCycles > 0;
            return `
                <div class="card" style="text-align:center;">
                    <div style="font-size:56px;margin-bottom:12px;">🧭</div>
                    <h2>Навигатор моего пути к цели</h2>
                    <p class="text-muted mb-16">
                        Привет. Я — твой Навигатор.<br>
                        У каждого пути есть тот, кто идёт.
                    </p>
                    ${hasHistory ? `
                        <div class="return-banner">
                            <h3>🌟 С возвращением!</h3>
                            <p class="text-muted">Ты уже прошёл ${state.completedCycles} ${state.completedCycles === 1 ? 'месяц' : state.completedCycles < 5 ? 'месяца' : 'месяцев'} с Навигатором.</p>
                        </div>

                            <button class="feeling-chip ${state.wandererEmoji === emoji ? 'selected' : ''}" data-emoji="${emoji}" style="font-size:24px;padding:10px 14px;">${emoji}</button>

                    <button class="btn btn-primary mt-12" id="btnStartWanderer">Дальше</button>

                    </div>
                    <button class="btn btn-primary mt-12 hidden" id="btnConfirmTempo">Продолжить</button>
                </div>
            `;

        function renderSetGoal() {
            return `
                <div class="card">
                    <div style="text-align:center;font-size:40px;margin-bottom:8px;">${state.wandererEmoji || '🧭'}</div>
                    <h2 style="text-align:center;">${state.wandererName || 'Путник'}, что ты хочешь?</h2>
                    <p class="text-muted text-center mb-16">

        function renderSetValues() {
            const selected = state.values || [];

                <div class="card">
                    <h2 style="text-align:center;">🧭 Компас ценностей</h2>
                    <p class="text-muted text-center mb-16">

        // ==================== ГЛАВНЫЙ ЭКРАН — ТРОПА ====================

        function renderTrail() {
            const progress = getProgress();
            const today = progress.today;
            const isReturning = state.completedCycles > 0;
            const showIdentityQuestion = today > 0 && today % 7 === 0 && !state.weeklyIdentity[getCurrentWeekNumber()];
            const showGratitude = today > 0 && today % 3 === 0 && !state.gratitudeGarden.find(g => g.dayNumber === today) &&

            return `
                <!-- Инфо-карточка путника -->
                <div class="card" style="padding:14px 18px;">

                        <div class="trail-info">
                            <div class="trail-name">${state.wandererName || 'Путник'}</div>
                            <div class="trail-goal">${state.goal || 'Цель ещё не задана'}</div>

                    </div>
                    ${today > 0 ? `

                            <div class="progress-fill" style="width:${progress.percent}%;"></div>
                        </div>
                        <div class="progress-stats">
                            <span>Прожито: ${progress.completed}</span>
                            <span>Сегодня: день ${today}</span>
                            <span>Осталось: ${progress.remaining}</span>
                        </div>
                    ` : ''}
                </div>

                <!-- Сетка шагов -->
                <div class="card">
                    <h3 style="text-align:center;">👣 Твой путь</h3>
                    <div class="steps-grid" id="stepsGrid">
                        ${renderStepCells(today)}
                    </div>
                    <div class="legend">
                        <span class="legend-item"><span class="legend-dot green"></span> Прожито</span>
                        <span class="legend-item"><span class="legend-dot blue"></span> Сегодня</span>
                        <span class="legend-item"><span class="legend-dot gray"></span> Пропущено</span>
                        <span class="legend-item">🔒 Будущее</span>
                    </div>
                </div>

                <!-- Действие дня -->
                ${today > 0 ? `
                    <div class="card text-center">
                        ${state.days[today] ? `
                            <p style="color:var(--green);font-weight:600;">✅ День ${today} уже прожит</p>
                            <p class="text-muted" style="font-size:13px;">Приближение: ${state.days[today].scale}/10</p>
                            <button class="btn btn-secondary btn-block mt-8" id="btnReviewToday">Посмотреть</button>
                        ` : `
                            <p style="font-weight:600;">Сегодня — день ${today}</p>
                            <p class="text-muted mb-8" style="font-size:13px;">${formatDate(today)}</p>
                            <button class="btn btn-primary btn-block" id="btnStartToday">Прожить этот день</button>
                        `}
                        <button class="btn btn-outline btn-sm btn-block mt-8" id="btnChangeGoal">Цель изменилась</button>
                    </div>
                ` : `
                    <div class="card text-center">
                        <p style="font-weight:600;font-size:18px;">🏁 Начало пути</p>
                        <p class="text-muted">Ты готов начать. Твой путь ждёт.</p>
                        <button class="btn btn-primary btn-block mt-8" id="btnStartJourney">Начать путь</button>
                    </div>
                `}

                ${showIdentityQuestion ? renderIdentityQuestion(getCurrentWeekNumber()) : ''}
                ${showGratitude ? renderGratitudeQuestion(today) : ''}

                <!-- Ссылка -->
                <div class="text-center mt-16" style="padding:12px;background:var(--accent-light);border-radius:var(--radius-sm);">
                    <p style="font-size:12px;color:var(--accent);">
                        Чувств больше, чем кажется — <a href="https://t.me/ginger_coach4you" target="_blank" style="color:var(--accent);font-weight:600;">«Разрешаю себе чувствовать»</a>
                    </p>
                </div>
            `;
        }

        function renderStepCells(today) {
            let cells = '';
            // Стартовая ячейка
            cells += `<div class="step-cell start" title="Начало пути">🏁</div>`;
            for (let d = 1; d <= TOTAL_DAYS; d++) {
                let cls = '';
                let content = d;
                let title = `День ${d}`;
                if (state.days[d]) {
                    cls = 'completed';
                    content = '⭐';
                    title = `День ${d} — прожит (${state.days[d].scale}/10)`;
                } else if (d < today) {
                    cls = 'missed';
                    content = '🔒';
                    title = `День ${d} — упущен`;
                } else if (d === today) {
                    cls = 'today';
                    content = d;
                    title = `Сегодня — день ${d}`;
                } else {
                    cls = 'future';
                    content = '🔒';
                    title = `День ${d} — ещё не наступил`;
                }
                cells += `<button class="step-cell ${cls}" data-day="${d}" title="${title}" ${cls === 'future' || cls === 'missed' ? 'disabled' : ''}>
                    <span class="day-num">${d}</span>${content}
                </button>`;
            }
            return cells;
        }

        // ==================== ЕЖЕДНЕВНАЯ КАРТОЧКА ====================

        function renderDailyCard(dayNumber) {
            const data = state.days[dayNumber] || null;

            return `
                <div class="card">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">

                </div>

        }

                <button class="btn btn-outline btn-sm btn-block mt-8" id="btnShareDay">Поделиться с Катей</button>

        function renderReviewDay(dayNumber) {
            const data = state.days[dayNumber];
            if (!data) {
                state.screen = 'trail';
                saveState(state);

                return '';

            return `
                <div class="card">

                    ${data.thoughtCheck ? `<p><strong>Факт или интерпретация:</strong> ${escapeHtml(data.thoughtCheck)}</p>` : ''}

                    ${data.helped ? `<p><strong>Что приблизило:</strong> ${escapeHtml(data.helped)}</p>` : ''}

                    ${data.insight ? `<p><strong>💡 Инсайт:</strong> ${escapeHtml(data.insight)}</p>` : ''}

                    <button class="btn btn-outline btn-sm btn-block mt-8" id="btnShareDay">Поделиться с Катей</button>

        function renderGratitudeQuestion(today) {

                <div class="card" style="background:#fefdf7;border-color:#e8e4d0;">
                    <h3>🌸 Сад благодарности</h3>

        function renderReturnScreen() {
            return `
                <div class="card" style="text-align:center;">
                    <div style="font-size:48px;">${state.wandererEmoji || '🧭'}</div>
                    <div class="return-banner">

        function renderSummary() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));
            const sortedDays = allDays.sort((a, b) => a.day - b.day);
            const scales = sortedDays.map(d => d.scale || 0);
            const avgScale = scales.length > 0 ? Math.round(scales.reduce((a, b) => a + b, 0) / scales.length) : 0;
            const insights = sortedDays.filter(d => d.insight).map(d => d.insight).slice(-5);
            const selfSupports = sortedDays.filter(d => d.selfSupport).map(d => d.selfSupport).slice(-5);
            const sessionNotes = sortedDays.filter(d => d.sessionNote).map(d => d.sessionNote);

            return `
                <div class="card text-center">
                    <div style="font-size:48px;">🌟</div>
                    <h2>${state.wandererName || 'Путник'}, твой путь пройден</h2>
                    <p class="text-muted">Месяц завершён. Посмотри, каким он был.</p>
                </div>
                <div class="card">
                    <h3>📊 Цифры пути</h3>
                    <div class="summary-section">
                        <p><strong>Пройдено дней:</strong> ${progress.completed} из ${TOTAL_DAYS}</p>
                        <p><strong>Среднее приближение:</strong> ${avgScale}/10</p>
                        ${scales.length > 0 ? `<p><strong>Старт → Финиш:</strong> ${scales[0]}/10 → ${scales[scales.length-1]}/10</p>` : ''}
                    </div>
                    ${scales.length > 0 ? `
                        <div style="display:flex;align-items:flex-end;gap:2px;height:80px;padding:8px 0;">
                            ${scales.map((s, i) => `<div style="flex:1;background:var(--primary);height:${s*10}%;border-radius:3px 3px 0 0;min-width:3px;" title="День ${i+1}: ${s}/10"></div>`).join('')}
                        </div>
                    ` : ''}
                </div>
                ${insights.length > 0 ? `
                    <div class="card"><h3>💡 Ключевые инсайты</h3>
                        ${insights.map(i => `<div class="summary-section">${escapeHtml(i)}</div>`).join('')}
                    </div>` : ''}
                ${Object.keys(state.weeklyIdentity).length > 0 ? `
                    <div class="card"><h3>🪞 Кто я сейчас</h3>
                        ${Object.entries(state.weeklyIdentity).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([w,t])=>`<div class="summary-section"><strong>Неделя ${w}:</strong> ${escapeHtml(t)}</div>`).join('')}
                    </div>` : ''}
                ${sessionNotes.length > 0 ? `
                    <div class="card"><h3>💬 Вопросы для сессии с Катей</h3>
                        ${sessionNotes.map(s => `<div class="summary-section">${escapeHtml(s)}</div>`).join('')}
                    </div>` : ''}
                <div class="card text-center">
                    <button class="btn btn-primary btn-block" id="btnShareSummary">Поделиться с Катей</button>
                    <button class="btn btn-secondary btn-block" id="btnSavePDF">Сохранить как PDF</button>
                </div>
                <div class="card text-center">
                    <h3>Что дальше?</h3>
                    <button class="btn btn-primary btn-block" id="btnNewCycle">Новая цель</button>
                    <button class="btn btn-secondary btn-block" id="btnContinueCycle">Продолжить с этой целью</button>
                    <button class="btn btn-outline btn-block" id="btnBackToTrail">← Вернуться на путь</button>
                </div>
            `;
        }

        // ==================== ОБРАБОТЧИКИ ====================

        function attachListeners() {
            // Создание путника
            const btnStart = document.getElementById('btnStartWanderer');
            if (btnStart) {
                btnStart.addEventListener('click', () => {
                    const nameInput = document.getElementById('wandererName');
                    state.wandererName = nameInput.value.trim() || 'Путник';
                    state.screen = 'choose_tempo';
                    saveState(state);
                    render();
                });
            }

            // Эмодзи-пикер
            const emojiPicker = document.getElementById('emojiPicker');
            if (emojiPicker) {
                emojiPicker.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-emoji]');
                    if (btn) { state.wandererEmoji = btn.dataset.emoji;
                        saveState(state);
                        render(); }
                });
            }

            // Выбор темпа
            const tempoOptions = document.getElementById('tempoOptions');
            if (tempoOptions) {
                tempoOptions.addEventListener('click', (e) => {
                    const card = e.target.closest('[data-tempo]');
                    if (card) {
                        state.tempo = card.dataset.tempo;
                        document.querySelectorAll('.tempo-card').forEach(c => c.classList.remove(
                            'selected'));
                        card.classList.add('selected');
                        document.getElementById('btnConfirmTempo').classList.remove('hidden');
                        saveState(state);
                    }
                });
            }
            const btnConfirmTempo = document.getElementById('btnConfirmTempo');
            if (btnConfirmTempo) {
                btnConfirmTempo.addEventListener('click', () => {
                    state.screen = 'set_goal';
                    state.startDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }

            // Сохранение цели
            const btnSaveGoal = document.getElementById('btnSaveGoal');
            if (btnSaveGoal) {
                btnSaveGoal.addEventListener('click', () => {
                    const input = document.getElementById('goalInput');
                    const newGoal = input.value.trim();
                    if (newGoal && newGoal !== state.goal && state.goal) {
                        state.goalHistory.push({ goal: state.goal, date: new Date().toISOString().split('T')[0] });
                    }
                    state.goal = newGoal || state.goal;
                    if (state.tempo === 'deep' || state.tempo === 'confident') {
                        state.screen = 'set_values';
                    } else {
                        // Мягкий старт или быстрый старт — сразу на тропу
                        state.screen = 'trail';
                        state.startDate = state.startDate || new Date().toISOString().split('T')[0];
                    }
                    saveState(state);
                    render();
                });
            }

            // Выбор ценностей
            const valuesGrid = document.getElementById('valuesGrid');
            if (valuesGrid) {
                valuesGrid.addEventListener('click', (e) => {
                    const chip = e.target.closest('[data-value]');
                    if (chip) {
                        const val = chip.dataset.value;
                        if (state.values.includes(val)) { state.values = state.values.filter(v => v !==
                                val); } else if (state.values.length < 3) { state.values.push(val); }
                        saveState(state);
                        render();
                    }
                });
            }
            const btnSaveValues = document.getElementById('btnSaveValues');
            if (btnSaveValues) {
                btnSaveValues.addEventListener('click', () => {
                    if (state.values.length === 3) {
                        state.screen = 'trail';
                        state.startDate = state.startDate || new Date().toISOString().split('T')[0];
                        saveState(state);
                        render();
                    }
                });
            }

            // Сетка шагов на тропе
            const stepsGrid = document.getElementById('stepsGrid');
            if (stepsGrid) {
                stepsGrid.addEventListener('click', (e) => {
                    const cell = e.target.closest('[data-day]');
                    if (cell && !cell.disabled) {
                        const day = parseInt(cell.dataset.day);
                        if (state.days[day]) {
                            state.screen = 'review_day';
                        } else {
                            state.screen = 'daily_card';
                        }
                        state.currentViewDay = day;
                        saveState(state);
                        render();
                    }
                });
            }

            // Начать путь (с тропы)
            const btnStartJourney = document.getElementById('btnStartJourney');
            if (btnStartJourney) {
                btnStartJourney.addEventListener('click', () => {
                    state.startDate = new Date().toISOString().split('T')[0];
                    state.screen = 'daily_card';
                    state.currentViewDay = 1;
                    saveState(state);
                    render();
                });
            }

            // Начать сегодняшний день
            const btnStartToday = document.getElementById('btnStartToday');
            if (btnStartToday) {
                btnStartToday.addEventListener('click', () => {
                    state.screen = 'daily_card';
                    state.currentViewDay = getTodayDayNumber();
                    saveState(state);
                    render();
                });
            }

            // Посмотреть сегодняшний день
            const btnReviewToday = document.getElementById('btnReviewToday');
            if (btnReviewToday) {
                btnReviewToday.addEventListener('click', () => {
                    state.screen = 'review_day';
                    state.currentViewDay = getTodayDayNumber();
                    saveState(state);
                    render();
                });
            }

            // Изменить цель
            const btnChangeGoal = document.getElementById('btnChangeGoal');
            if (btnChangeGoal) {
                btnChangeGoal.addEventListener('click', () => {
                    state.screen = 'set_goal';
                    saveState(state);
                    render();
                });
            }

            // Назад на тропу
            document.querySelectorAll('[id^="btnBackToTrail"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.screen = 'trail';
                    saveState(state);
                    render();
                });
            });

            // Шкала в форме дня
            const scaleRow = document.getElementById('scaleRow');
            if (scaleRow) {
                scaleRow.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-scale]');
                    if (btn) {
                        document.querySelectorAll('#scaleRow .scale-btn').forEach(b => b.classList.remove(
                            'active'));
                        btn.classList.add('active');
                        const scale = parseInt(btn.dataset.scale);
                        const thoughtCheck = document.getElementById('thoughtCheck');
                        if (scale <= 4 && thoughtCheck) {
                            thoughtCheck.classList.remove('hidden');
                            thoughtCheck.innerHTML = `
                                <div class="container-box mt-8">
                                    <p style="font-size:13px;">Когда приближение небольшое — часто включаются автоматические мысли.</p>
                                    <label>Это факт или интерпретация?</label>
                                    <textarea id="thoughtCheckInput" placeholder="Факт можно доказать. Интерпретация — то, как я это воспринимаю."></textarea>
                                    <label>Что бы ты сказал(а) другу с такой же мыслью?</label>
                                    <textarea id="thoughtAltInput" placeholder="Альтернативный взгляд..."></textarea>
                                </div>
                            `;
                        } else if (thoughtCheck) {
                            thoughtCheck.classList.add('hidden');
                        }
                    }
                });
            }

            // Чувства
            const feelingsGrid = document.getElementById('feelingsGrid');
            if (feelingsGrid) {
                feelingsGrid.addEventListener('click', (e) => {
                    const chip = e.target.closest('[data-feeling]');
                    if (chip) {
                        chip.classList.toggle('selected');
                        updateHeavyFeelingContainer();
                    }
                });
            }

            // Сохранение дня
            const btnSaveDay = document.getElementById('btnSaveDay');
            if (btnSaveDay) {
                btnSaveDay.addEventListener('click', () => {
                    const dayNumber = state.currentViewDay || getTodayDayNumber();
                    const selectedScaleBtn = document.querySelector('#scaleRow .scale-btn.active');
                    const scale = selectedScaleBtn ? parseInt(selectedScaleBtn.dataset.scale) : 5;
                    const selectedFeelings = [...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')]
                        .map(c => c.dataset.feeling);
                    state.days[dayNumber] = {
                        scale,
                        feelings: selectedFeelings,
                        thought: document.getElementById('thoughtInput')?.value || '',
                        thoughtCheck: document.getElementById('thoughtCheckInput')?.value || '',
                        thoughtAlt: document.getElementById('thoughtAltInput')?.value || '',
                        helped: document.getElementById('helpedInput')?.value || '',
                        hindered: document.getElementById('hinderedInput')?.value || '',
                        insight: document.getElementById('insightInput')?.value || '',
                        win: document.getElementById('winInput')?.value || '',
                        selfSupport: document.getElementById('selfSupportInput')?.value || '',
                        sessionNote: document.getElementById('sessionNoteInput')?.value || '',
                        timestamp: new Date().toISOString()
                    };
                    // Проверяем завершение
                    if (dayNumber >= TOTAL_DAYS) {
                        state.screen = 'completed';
                    } else {
                        state.screen = 'trail';
                    }
                    state.lastActiveDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }

            // Сохранение идентичности
            const btnSaveIdentity = document.getElementById('btnSaveIdentity');
            if (btnSaveIdentity) {
                btnSaveIdentity.addEventListener('click', () => {
                    const weekNumber = getCurrentWeekNumber();
                    const input = document.getElementById('identityInput');
                    if (input && input.value.trim()) {
                        state.weeklyIdentity[weekNumber] = input.value.trim();
                        saveState(state);
                        render();
                    }
                });
            }

            // Сохранение благодарности
            const btnSaveGratitude = document.getElementById('btnSaveGratitude');
            if (btnSaveGratitude) {
                btnSaveGratitude.addEventListener('click', () => {
                    const today = getTodayDayNumber();
                    const input = document.getElementById('gratitudeInput');
                    if (input && input.value.trim()) {
                        state.gratitudeGarden.push({ dayNumber: today, text: input.value.trim() });
                        saveState(state);
                        render();
                    }
                });
            }

            // Возвращение
            const btnReturnToday = document.getElementById('btnReturnToday');
            if (btnReturnToday) {
                btnReturnToday.addEventListener('click', () => {
                    state.screen = 'trail';
                    state.lastActiveDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }
            const btnReturnTrail = document.getElementById('btnReturnTrail');
            if (btnReturnTrail) {
                btnReturnTrail.addEventListener('click', () => {
                    state.screen = 'trail';
                    state.lastActiveDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }

            // Шаринг
            document.querySelectorAll('#btnShareDay, #btnShareSummary').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dayNumber = state.currentViewDay || getTodayDayNumber();
                    const data = state.days[dayNumber];
                    const text = data ? buildDayShareText(dayNumber, data) : buildSummaryShareText();
                    shareToTelegram(text);
                    state.sharingHistory.push({ type: data ? 'day' : 'summary', date: new Date()
                            .toISOString() });
                    saveState(state);
                });
            });

            // PDF
            const btnSavePDF = document.getElementById('btnSavePDF');
            if (btnSavePDF) { btnSavePDF.addEventListener('click', saveAsPDF); }

            // Новый цикл
            const btnNewCycle = document.getElementById('btnNewCycle');
            if (btnNewCycle) {
                btnNewCycle.addEventListener('click', () => {
                    state.completedCycles++;
                    state.screen = 'set_goal';
                    state.goal = '';
                    state.startDate = null;
                    state.days = {};
                    state.weeklyIdentity = {};
                    state.gratitudeGarden = [];
                    state.goalHistory = [];
                    saveState(state);
                    render();
                });
            }
            const btnContinueCycle = document.getElementById('btnContinueCycle');
            if (btnContinueCycle) {
                btnContinueCycle.addEventListener('click', () => {
                    state.completedCycles++;
                    state.screen = 'trail';
                    state.startDate = new Date().toISOString().split('T')[0];
                    state.days = {};
                    state.weeklyIdentity = {};
                    state.gratitudeGarden = [];
                    saveState(state);
                    render();
                });
            }
        }

        function updateHeavyFeelingContainer() {
            const container = document.getElementById('heavyFeelingContainer');
            if (!container) return;
            const selectedFeelings = [...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')].map(c => c.dataset
                .feeling);
            const heavySelected = selectedFeelings.filter(fid => HEAVY_FEELINGS[fid]);
            if (heavySelected.length > 0) {
                const hf = HEAVY_FEELINGS[heavySelected[0]];
                container.innerHTML = `
                    <div class="container-box">
                        <h4>${hf.title}</h4>
                        <p>${hf.body}</p>
                        <p><strong>${hf.truth}</strong></p>
                        <p class="note">${hf.note}</p>
                        <a href="https://t.me/ginger_coach4you" target="_blank" class="btn btn-outline btn-sm mt-8">Мне нужно больше поддержки</a>
                    </div>
                `;
            } else { container.innerHTML = ''; }
        }

        function buildDayShareText(dayNumber, data) {
            const f = data.feelings ? data.feelings.map(fid => FEELINGS.find(ff => ff.id === fid)).filter(Boolean) : [];
            let text = `🧭 ${state.wandererName || 'Путник'}, ${formatDate(dayNumber)}\n\n`;
            text += `Приближение: ${data.scale}/10\n`;
            if (f.length > 0) text += `Чувства: ${f.map(ff => ff.emoji + ' ' + ff.name).join(', ')}\n`;
            if (data.insight) text += `\n💡 Инсайт: ${data.insight}\n`;
            if (data.sessionNote) text += `\n💬 На сессию: ${data.sessionNote}\n`;
            text += `\n— Навигатор моего пути`;
            return text;
        }

        function buildSummaryShareText() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));
            const scales = allDays.map(d => d.scale || 0);
            const avgScale = scales.length > 0 ? Math.round(scales.reduce((a, b) => a + b, 0) / scales.length) : 0;
            let text = `🌟 ${state.wandererName || 'Путник'}, мой путь за месяц\n\n`;
            text += `Пройдено: ${progress.completed} из ${TOTAL_DAYS}\n`;
            text += `Среднее приближение: ${avgScale}/10\n`;
            const lastIdentity = Object.entries(state.weeklyIdentity).sort((a, b) => parseInt(b[0]) - parseInt(a[0]))[0];
            if (lastIdentity) text += `\n🪞 Кто я сейчас: ${lastIdentity[1]}\n`;
            text += `\n— Навигатор моего пути`;
            return text;
        }

        function shareToTelegram(text) {
            const encoded = encodeURIComponent(text);
            window.open(`https://t.me/ginger_coach4you?text=${encoded}`, '_blank');
        }

        function saveAsPDF() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));
            const sortedDays = allDays.sort((a, b) => a.day - b.day);
            const scales = sortedDays.map(d => d.scale || 0);
            const insights = sortedDays.filter(d => d.insight).map(d => d.insight);
            const selfSupports = sortedDays.filter(d => d.selfSupport).map(d => d.selfSupport);
            const sessionNotes = sortedDays.filter(d => d.sessionNote).map(d => d.sessionNote);

            let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Навигатор — Итоги пути</title>
                <style>body{font-family:-apple-system,sans-serif;color:#3a3a3a;padding:24px;max-width:520px;margin:0 auto;line-height:1.6;}
                h1{color:#4a7c96;font-size:20px;text-align:center;}h2{color:#4a7c96;font-size:16px;margin-top:16px;border-bottom:1px solid #e8e4dd;padding-bottom:4px;}
                .section{background:#fafaf9;padding:10px;border-radius:8px;margin:8px 0;}</style></head><body>
                <h1>${state.wandererEmoji||'🧭'} ${state.wandererName||'Путник'} — карта пути</h1>
                <p style="text-align:center;color:#7a7a7a;">${escapeHtml(state.goal||'')}</p>
                ${state.values.length>0?`<p style="text-align:center;">🧭 ${state.values.join(' • ')}</p>`:''}
                <h2>📊 Цифры</h2><p>Пройдено: ${progress.completed} из ${TOTAL_DAYS}</p>
                ${scales.length>0?`<p>Старт: ${scales[0]}/10 → Финиш: ${scales[scales.length-1]}/10</p>`:''}
                ${insights.length>0?`<h2>💡 Инсайты</h2>${insights.map(i=>`<div class="section">${escapeHtml(i)}</div>`).join('')}`:''}
                ${Object.keys(state.weeklyIdentity).length>0?`<h2>🪞 Кто я сейчас</h2>${Object.entries(state.weeklyIdentity).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([w,t])=>`<div class="section"><strong>Неделя ${w}:</strong> ${escapeHtml(t)}</div>`).join('')}`:''}
                ${sessionNotes.length>0?`<h2>💬 На сессию с Катей</h2>${sessionNotes.map(s=>`<div class="section">${escapeHtml(s)}</div>`).join('')}`:''}
                ${state.gratitudeGarden.length>0?`<h2>🌸 Сад благодарности</h2>${state.gratitudeGarden.map(g=>`<div class="section">${escapeHtml(g.text)}</div>`).join('')}`:''}
                <p style="text-align:center;margin-top:20px;color:#7a7a7a;">🤍 Навигатор моего пути к цели</p></body></html>`;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(html);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 500);
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================

        // Если есть стартовая дата и сегодня больше 30 — завершаем
        if (state.startDate && state.screen !== 'completed') {
            const today = getTodayDayNumber();
            if (today > TOTAL_DAYS) {
                state.screen = 'completed';
            }
        }

        render();
    </script>
</body>
</html>
