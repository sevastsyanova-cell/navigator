<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор моего пути к цели</title>
    <style>
        :root {
            --bg: #f9f7f3;
            --card: #ffffff;
            --primary: #4a7c96;
            --primary-light: #e6f0f5;
            --accent: #c4946c;
            --text: #3a3a3a;
            --text-light: #7a7a7a;
            --border: #e8e4dd;
            --shadow: 0 2px 16px rgba(60, 40, 30, 0.06);
            --green: #7a9a7e;
            --green-bg: #edf5ee;
            --amber: #c9a96e;
            --amber-bg: #fdf7ed;
            --red: #c47a7a;
            --red-bg: #fdf0f0;
            --blue: #6b8fad;
            --blue-bg: #eef4f8;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px 20px 40px;
        }

        /* Заголовки */
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }
        h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        /* Карточки */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-family: inherit;
            letter-spacing: 0.2px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover {
            background: #3d6b83;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: var(--primary-light);
            color: var(--primary);
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 20px;
        }
        .btn-block {
            width: 100%;
            margin-bottom: 8px;
        }

        /* Поля ввода */
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 4px;
            letter-spacing: 0.2px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            background: #fafaf9;
            transition: border 0.2s;
            resize: vertical;
            color: var(--text);
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }
        textarea {
            min-height: 70px;
        }

        /* Шкала */
        .scale-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 14px;
        }
        .scale-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text);
            font-family: inherit;
        }
        .scale-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .scale-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Чувства */
        .feelings-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 14px;
        }
        .feeling-chip {
            padding: 7px 12px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            color: var(--text);
        }
        .feeling-chip:hover {
            border-color: var(--primary);
            background: #f8fafb;
        }
        .feeling-chip.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 500;
        }

        /* Темп */
        .tempo-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 14px 0;
        }
        .tempo-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
            color: var(--text);
        }
        .tempo-card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 12px rgba(74, 124, 150, 0.1);
        }
        .tempo-card.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        .tempo-icon {
            font-size: 28px;
            margin-bottom: 6px;
            display: block;
        }
        .tempo-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
        }
        .tempo-desc {
            font-size: 12px;
            color: var(--text-light);
        }

        /* Контейнер для чувств */
        .container-box {
            background: #fdf7f0;
            border: 1px solid #e8d5c0;
            border-radius: var(--radius);
            padding: 16px;
            margin: 12px 0;
        }
        .container-box h4 {
            font-size: 15px;
            margin-bottom: 6px;
            color: var(--accent);
        }
        .container-box p {
            font-size: 13px;
            color: #6b5b4e;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .container-box .note {
            font-style: italic;
            font-size: 12px;
            color: #8a7a6a;
        }

        /* Индикаторы */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-green {
            background: var(--green-bg);
            color: var(--green);
        }
        .badge-amber {
            background: var(--amber-bg);
            color: var(--amber);
        }

        /* Прогресс */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e8e4dd;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
        }

        /* Итоги */
        .summary-section {
            margin: 14px 0;
            padding: 14px;
            background: #fafaf9;
            border-radius: var(--radius-sm);
        }
        .summary-section h4 {
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 6px;
        }

        /* Возвращение */
        .return-banner {
            background: #fdf7ed;
            border: 1px solid #e8d5c0;
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            margin-bottom: 14px;
        }
        .return-banner h3 {
            color: var(--accent);
            margin-bottom: 4px;
        }

        /* Утилиты */
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: var(--text-light);
            font-size: 13px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .mb-12 {
            margin-bottom: 12px;
        }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 14px 0;
        }
        .hidden {
            display: none !important;
        }

        /* Скролл для чувств */
        .feelings-scroll {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Адаптация */
        @media (max-width: 400px) {
            .container {
                padding: 12px 14px 30px;
            }
            .card {
                padding: 16px 14px;
            }
            h1 {
                font-size: 20px;
            }
            .scale-btn {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Контент рендерится через JS -->
    </div>

    <script>
        // ==================== ДАННЫЕ И КОНСТАНТЫ ====================

        const STORAGE_KEY = 'navigator_my_path_v2';

        // Список ценностей
        const ALL_VALUES = [
            'Свобода', 'Безопасность', 'Любовь', 'Принятие', 'Честность',
            'Уважение', 'Развитие', 'Творчество', 'Семья', 'Здоровье',
            'Дружба', 'Признание', 'Покой', 'Приключения', 'Стабильность',
            'Забота', 'Благодарность', 'Осознанность', 'Радость', 'Смысл',
            'Ответственность', 'Лёгкость', 'Доверие', 'Щедрость', 'Уединение',
            'Общность', 'Смелость', 'Нежность', 'Справедливость', 'Верность',
            'Спонтанность', 'Порядок', 'Уют', 'Статус', 'Служение'
        ];

        // 15 чувств с описаниями
        const FEELINGS = [
            { id: 'fear', emoji: '😨', name: 'Страх', tagline: 'Мне страшно. А значит — важно.' },
            { id: 'anger', emoji: '🔥', name: 'Злость', tagline: 'Я злюсь. А значит — мне не всё равно.' },
            { id: 'guilt', emoji: '😞', name: 'Вина', tagline: 'Я чувствую вину. А значит — мне важны отношения.' },
            { id: 'shame', emoji: '🫣', name: 'Стыд', tagline: 'Мне стыдно. А значит — я хочу быть принятой.' },
            { id: 'sadness', emoji: '💧', name: 'Печаль', tagline: 'Мне грустно. А значит — я что-то теряю, и это важно.' },
            { id: 'disgust', emoji: '😟', name: 'Отвращение', tagline: 'Мне неприятно. А значит — мои ценности под угрозой.' },
            { id: 'despair', emoji: '🌪️', name: 'Отчаяние',
        tagline: 'Я в отчаянии. А значит — старые опоры рухнули, новые ещё не выросли.' },
            { id: 'confusion', emoji: '😶', name: 'Растерянность',
        tagline: 'Я растеряна. А значит — я на перекрёстке, и это нормально.' },
            { id: 'boredom', emoji: '😑', name: 'Скука', tagline: 'Мне скучно. А значит — старое больше не работает.' },
            { id: 'envy', emoji: '🎯', name: 'Зависть', tagline: 'Мне завидно. А значит — я вижу, чего хочу.' },
            { id: 'disappointment', emoji: '🎈', name: 'Разочарование',
                tagline: 'Я разочарована. А значит — иллюзия встретилась с реальностью.' },
            { id: 'regret', emoji: '😔', name: 'Сожаление', tagline: 'Я сожалею. А значит — мне важно было бы иначе.' },
            { id: 'resentment', emoji: '🦔', name: 'Обида', tagline: 'Мне обидно. А значит — меня не увидели там, где было важно.' },
            { id: 'joy', emoji: '🌞', name: 'Радость', tagline: 'Я радуюсь. А значит — я живая.' },
            { id: 'interest', emoji: '🧠', name: 'Интерес', tagline: 'Мне интересно. А значит — я живой.' }
        ];

        // Тяжёлые чувства с контейнерами
        const HEAVY_FEELINGS = {
            shame: {
                title: '💭 Стыд',
                body: 'Стыд часто говорит голосом из прошлого. Он шепчет: «Ты какая-то не такая. Спрячься.»',
                truth: 'Но правда в другом: стыд — это просто чувство. Оно не про то, кто ты есть. Оно про то, как когда-то тебя не приняли.',
                note: 'Это чувство — не весь ты. Ты больше, чем стыд. Сейчас тебе может быть трудно. Это нормально.'
            },
            despair: {
                title: '🌪️ Отчаяние',
                body: 'Отчаяние приходит, когда старые опоры рухнули, а новые ещё не выросли. Это не конец пути.',
                truth: 'Это момент, когда старая карта кончилась, а новая ещё не нарисована. Ты не сломался — ты на перевале.',
                note: 'Это чувство — не весь ты. Ты больше, чем отчаяние. Сейчас тебе может быть трудно. Это нормально.'
            },
            guilt: {
                title: '💭 Вина',
                body: 'Вина часто говорит: «Ты сделала что-то не так. Ты подвела.»',
                truth: 'Но вина — это не приговор. Это сигнал, что тебе важны отношения. И ты хочешь быть в связи с другими.',
                note: 'Это чувство — не весь ты. Ты больше, чем вина. Сейчас тебе может быть трудно. Это нормально.'
            },
            resentment: {
                title: '🦔 Обида',
                body: 'Обида — это когда больно, но сказать трудно. Когда тебя не увидели там, где было важно.',
                truth: 'Обида говорит о твоей потребности быть замеченной. Это не слабость. Это честность.',
                note: 'Это чувство — не весь ты. Ты больше, чем обида. Сейчас тебе может быть трудно. Это нормально.'
            },
            fear: {
                title: '😨 Страх',
                body: 'Страх — это сторожевой пёс. Он оберегает то, что тебе дорого. Он не враг.',
                truth: 'Страх говорит: «Здесь что-то важное». Он не мешает двигаться — он помогает двигаться осознанно.',
                note: 'Это чувство — не весь ты. Ты больше, чем страх. Сейчас тебе может быть трудно. Это нормально.'
            }
        };

        // Поддерживающие фразы для спадов и подъёмов
        const SUPPORT_PHRASES = {
            low: [
                'Спад — это часть пути, а не ошибка. Что бы ты сказал другу, который прошёл столько же? Скажи это себе.',
                'Иногда шаг назад — это способ разбежаться. Ты всё ещё на пути.',
                'Не каждый день будет лёгким. Но каждый день ты здесь — и это уже победа.'
            ],
            high: [
                'Ты на верном пути. Что именно помогло сегодня? Запомни это.',
                'Сегодня твой след особенно глубокий. Ты приблизился к себе.',
                'Заметь этот момент. Ты выбрал себя сегодня — и это сработало.'
            ],
            return: [
                'Ты вернулся. Это главное. Путь не стёрся — он ждал тебя.',
                'Ты здесь. И это важнее, чем все пропущенные дни.',
                'Каждый день — это новый шанс. Сегодня ты им воспользовался.'
            ]
        };

        // ==================== УПРАВЛЕНИЕ ДАННЫМИ ====================

        function getDefaultState() {
            return {
                phase: 'create_wanderer', // create_wanderer | choose_tempo | set_goal | set_values | daily | completed
                wandererName: '',
                wandererEmoji: '',
                goal: '',
                goalHistory: [], // {goal, date}
                values: [],
                tempo: '', // soft | confident | deep
                startDate: null,
                currentDay: 1,
                totalDays: 30,
                days: {}, // {dayNumber: {scale, feelings, thought, thoughtCheck, helped, hindered, insight, win, selfSupport, sessionNote, timestamp}}
                weeklyIdentity: {}, // {weekNumber: text}
                gratitudeGarden: [], // {dayNumber, text}
                lastActiveDate: null,
                completedCycles: 0,
                sharingHistory: []
            };
        }

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    return JSON.parse(raw);
                } catch (e) {
                    return getDefaultState();
                }
            }
            return getDefaultState();
        }

        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        let state = loadState();

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================

        function getTodayDayNumber() {
            if (!state.startDate) return 1;
            const start = new Date(state.startDate);
            const today = new Date();
            const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
            return Math.max(1, Math.min(state.totalDays, diff));
        }

        function getDaysSinceLastActive() {
            if (!state.lastActiveDate) return 0;
            const last = new Date(state.lastActiveDate);
            const today = new Date();
            return Math.floor((today - last) / (1000 * 60 * 60 * 24));
        }

        function getProgress() {
            const total = state.totalDays;
            const completed = Object.keys(state.days).length;
            const missed = state.currentDay - 1 - completed;
            const remaining = total - state.currentDay;
            const percent = Math.round((completed / Math.max(1, state.currentDay)) * 100);
            return { total, completed, missed: Math.max(0, missed), remaining, percent };
        }

        function getCurrentWeekNumber() {
            return Math.ceil(state.currentDay / 7);
        }

        function formatDate(dayNumber) {
            if (!state.startDate) return `День ${dayNumber}`;
            const start = new Date(state.startDate);
            start.setDate(start.getDate() + dayNumber - 1);
            const months = [
                'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
                'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'
            ];
            return `${start.getDate()} ${months[start.getMonth()]}`;
        }

        function getRandomPhrase(category) {
            const phrases = SUPPORT_PHRASES[category];
            return phrases[Math.floor(Math.random() * phrases.length)];
        }

        // ==================== РЕНДЕРИНГ ====================

        function render() {
            const app = document.getElementById('app');
            state.lastActiveDate = new Date().toISOString().split('T')[0];
            saveState(state);

            // Проверка на возвращение
            const daysAway = getDaysSinceLastActive();
            if (daysAway >= 3 && state.phase === 'daily' && state.currentDay > 1) {
                app.innerHTML = renderReturnScreen();
                return;
            }

            switch (state.phase) {
                case 'create_wanderer':
                    app.innerHTML = renderCreateWanderer();
                    break;
                case 'choose_tempo':
                    app.innerHTML = renderChooseTempo();
                    break;
                case 'set_goal':
                    app.innerHTML = renderSetGoal();
                    break;
                case 'set_values':
                    app.innerHTML = renderSetValues();
                    break;
                case 'daily':
                    app.innerHTML = renderDaily();
                    break;
                case 'completed':
                    app.innerHTML = renderSummary();
                    break;
                default:
                    app.innerHTML = renderCreateWanderer();
            }

            attachListeners();
        }

        function renderCreateWanderer() {
            const hasHistory = state.completedCycles > 0;
            return `
                <div class="card">
                    <div style="text-align:center;margin-bottom:16px;">
                        <span style="font-size:48px;">🧭</span>
                    </div>
                    <h2 style="text-align:center;">Навигатор моего пути к цели</h2>
                    <p style="text-align:center;color:var(--text-light);margin-bottom:16px;">
                        Привет. Я — твой Навигатор.<br>
                        Нам предстоит путь. Но у каждого пути есть тот, кто идёт.
                    </p>
                    ${hasHistory ? `
                        <div class="return-banner">
                            <h3>🌟 С возвращением!</h3>
                            <p style="font-size:13px;color:var(--text-light);">
                                Ты уже прошёл ${state.completedCycles} ${state.completedCycles === 1 ? 'месяц' : state.completedCycles < 5 ? 'месяца' : 'месяцев'} с Навигатором.<br>
                                Компас ценностей и карта чувств остались с тобой.
                            </p>
                        </div>
                    ` : ''}
                    <p style="text-align:center;color:var(--text-light);font-size:14px;">
                        Как зовут твоего путника?<br>
                        Это можешь быть ты. А можешь — персонаж.<br>
                        <em>Например: Эо, Лира, Странник, Облако, Север...</em>
                    </p>
                    <input type="text" id="wandererName" placeholder="Имя путника" value="${escapeHtml(state.wandererName)}" maxlength="30">
                    <p style="text-align:center;color:var(--text-light);font-size:14px;margin-top:12px;">
                        Выбери образ:
                    </p>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px;" id="emojiPicker">

        function renderSummary() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));

            const avgScale = scales.length > 0 ? Math.round(scales.reduce((a, b) => a + b, 0) / scales.length) : 0;

            sortedDays.forEach(d => {
                if (d.feelings) d.feelings.forEach(fid => { allFeelings[fid] = (allFeelings[fid] || 0) + 1; });
            });
            const topFeelings = Object.entries(allFeelings).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const insights = sortedDays.filter(d => d.insight).map(d => d.insight);
            const topInsights = insights.slice(-5);

                        ${scales.map((s, i) => `
                            <div style="flex:1;background:var(--primary);height:${s*10}%;border-radius:3px 3px 0 0;min-width:4px;" title="День ${i+1}: ${s}/10"></div>

                    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);margin-top:4px;">

                            <div class="summary-section">
                                <p style="font-size:12px;color:var(--text-light);">Развилка ${i+1}:</p>
                                <p style="font-size:13px;">${escapeHtml(h.goal)}</p>

                ${topFeelings.length > 0 ? `

                    <div class="card">
                        <h3>🌸 Сад благодарности</h3>
                        ${state.gratitudeGarden.map(g => `
                            <div class="summary-section">

                    <button class="btn btn-outline btn-block" id="btnExit">Сохранить и выйти</button>
                </div>
            `;

        // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================

        function attachListeners() {
            // Создание путника
            const btnStart = document.getElementById('btnStartWanderer');
            if (btnStart) {
                btnStart.addEventListener('click', () => {
                    const nameInput = document.getElementById('wandererName');
                    state.wandererName = nameInput.value.trim() || 'Путник';
                    if (state.completedCycles > 0) {
                        state.phase = 'choose_tempo';
                    } else {
                        state.phase = 'choose_tempo';
                    }
                    saveState(state);
                    render();
                });
            }

            // Эмодзи-пикер
            const emojiPicker = document.getElementById('emojiPicker');
            if (emojiPicker) {
                emojiPicker.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-emoji]');
                    if (btn) {
                        state.wandererEmoji = btn.dataset.emoji;
                        saveState(state);
                        render();
                    }
                });
            }

            // Выбор темпа
            const tempoOptions = document.getElementById('tempoOptions');
            if (tempoOptions) {
                tempoOptions.addEventListener('click', (e) => {
                    const card = e.target.closest('[data-tempo]');
                    if (card) {
                        state.tempo = card.dataset.tempo;
                        document.querySelectorAll('.tempo-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        document.getElementById('btnConfirmTempo').classList.remove('hidden');
                        saveState(state);
                    }
                });
            }
            const btnConfirmTempo = document.getElementById('btnConfirmTempo');
            if (btnConfirmTempo) {
                btnConfirmTempo.addEventListener('click', () => {
                    if (state.tempo === 'deep') {
                        state.phase = 'set_goal';
                    } else if (state.tempo === 'confident') {
                        state.phase = 'set_goal';
                    } else {
                        state.phase = 'set_goal';
                    }
                    state.startDate = new Date().toISOString().split('T')[0];
                    state.currentDay = 1;
                    saveState(state);
                    render();
                });
            }

            // Сохранение цели
            const btnSaveGoal = document.getElementById('btnSaveGoal');
            if (btnSaveGoal) {
                btnSaveGoal.addEventListener('click', () => {
                    const input = document.getElementById('goalInput');
                    const newGoal = input.value.trim();
                    if (newGoal && newGoal !== state.goal && state.goal) {
                        state.goalHistory.push({ goal: state.goal, date: new Date().toISOString().split('T')[0] });
                    }
                    state.goal = newGoal || state.goal;
                    if (state.tempo === 'deep') {
                        state.phase = 'set_values';
                    } else if (state.tempo === 'confident') {
                        state.phase = 'set_values';
                    } else {
                        state.phase = 'set_values';
                    }
                    saveState(state);
                    render();
                });
            }

            // Выбор ценностей
            const valuesGrid = document.getElementById('valuesGrid');
            if (valuesGrid) {
                valuesGrid.addEventListener('click', (e) => {
                    const chip = e.target.closest('[data-value]');
                    if (chip) {
                        const val = chip.dataset.value;
                        if (state.values.includes(val)) {
                            state.values = state.values.filter(v => v !== val);
                        } else if (state.values.length < 3) {
                            state.values.push(val);
                        }
                        saveState(state);
                        render();
                    }
                });
            }
            const btnSaveValues = document.getElementById('btnSaveValues');
            if (btnSaveValues) {
                btnSaveValues.addEventListener('click', () => {
                    if (state.values.length === 3) {
                        state.phase = 'daily';
                        state.currentDay = getTodayDayNumber();
                        saveState(state);
                        render();
                    }
                });
            }

            // Ежедневная карточка — шкала
            const scaleRow = document.getElementById('scaleRow');
            if (scaleRow) {
                scaleRow.addEventListener('click', (e) => {
                    const btn = e.target.closest('[data-scale]');
                    if (btn) {
                        const scale = parseInt(btn.dataset.scale);
                        document.querySelectorAll('#scaleRow .scale-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        btn.dataset.selectedScale = scale;

                        // Показываем проверку мыслей при шкале ≤4
                        if (scale <= 4) {
                            const thoughtCheck = document.getElementById('thoughtCheck');
                            if (thoughtCheck) {
                                thoughtCheck.classList.remove('hidden');
                                thoughtCheck.innerHTML = `
                                    <div class="container-box mt-8">
                                        <p style="font-size:13px;">Когда приближение небольшое — часто включаются автоматические мысли.</p>
                                        <label>Это факт или твоя интерпретация?</label>
                                        <textarea id="thoughtCheckInput" placeholder="Факт — это то, что можно доказать. Интерпретация — то, как я это воспринимаю."></textarea>
                                        <label>Может быть иначе? Что бы ты сказал(а) другу с такой же мыслью?</label>
                                        <textarea id="thoughtAltInput" placeholder="Альтернативный взгляд..."></textarea>
                                    </div>
                                `;
                            }
                        } else {
                            const thoughtCheck = document.getElementById('thoughtCheck');
                            if (thoughtCheck) thoughtCheck.classList.add('hidden');
                        }
                    }
                });
            }

            // Выбор чувств
            const feelingsGrid = document.getElementById('feelingsGrid');
            if (feelingsGrid) {
                feelingsGrid.addEventListener('click', (e) => {
                    const chip = e.target.closest('[data-feeling]');
                    if (chip) {
                        const fid = chip.dataset.feeling;
                        chip.classList.toggle('selected');
                        // Показываем контейнер для тяжёлых чувств
                        updateHeavyFeelingContainer();
                    }
                });
            }

            // Сохранение дня
            const btnSaveDay = document.getElementById('btnSaveDay');
            if (btnSaveDay) {
                btnSaveDay.addEventListener('click', () => {
                    const today = getTodayDayNumber();
                    const selectedScaleBtn = document.querySelector('#scaleRow .scale-btn.active');
                    const scale = selectedScaleBtn ? parseInt(selectedScaleBtn.dataset.scale) : 5;
                    const selectedFeelings = [...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')].map(c => c.dataset
                        .feeling);
                    const thought = document.getElementById('thoughtInput')?.value || '';
                    const thoughtCheckInput = document.getElementById('thoughtCheckInput');
                    const thoughtAltInput = document.getElementById('thoughtAltInput');
                    const helped = document.getElementById('helpedInput')?.value || '';
                    const hindered = document.getElementById('hinderedInput')?.value || '';
                    const insight = document.getElementById('insightInput')?.value || '';
                    const win = document.getElementById('winInput')?.value || '';
                    const selfSupport = document.getElementById('selfSupportInput')?.value || '';
                    const sessionNote = document.getElementById('sessionNoteInput')?.value || '';

                    state.days[today] = {
                        scale,
                        feelings: selectedFeelings,
                        thought,
                        thoughtCheck: thoughtCheckInput ? thoughtCheckInput.value : '',
                        thoughtAlt: thoughtAltInput ? thoughtAltInput.value : '',
                        helped,
                        hindered,
                        insight,
                        win,
                        selfSupport,
                        sessionNote,
                        timestamp: new Date().toISOString()
                    };
                    state.currentDay = Math.max(state.currentDay, today + 1);
                    if (state.currentDay > state.totalDays) state.phase = 'completed';
                    state.lastActiveDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }

            // Просмотр выполненного дня
            const btnReviewDay = document.getElementById('btnReviewDay');
            if (btnReviewDay) {
                btnReviewDay.addEventListener('click', () => {
                    const today = getTodayDayNumber();
                    const data = state.days[today];
                    if (data) {
                        showReviewModal(today, data);
                    }
                });
            }

            // Сохранение идентичности
            const btnSaveIdentity = document.getElementById('btnSaveIdentity');
            if (btnSaveIdentity) {
                btnSaveIdentity.addEventListener('click', () => {
                    const weekNumber = getCurrentWeekNumber();
                    const input = document.getElementById('identityInput');
                    if (input && input.value.trim()) {
                        state.weeklyIdentity[weekNumber] = input.value.trim();
                        saveState(state);
                        render();
                    }
                });
            }

            // Сохранение благодарности
            const btnSaveGratitude = document.getElementById('btnSaveGratitude');
            if (btnSaveGratitude) {
                btnSaveGratitude.addEventListener('click', () => {
                    const today = getTodayDayNumber();
                    const input = document.getElementById('gratitudeInput');
                    if (input && input.value.trim()) {
                        state.gratitudeGarden.push({ dayNumber: today, text: input.value.trim() });
                        saveState(state);
                        render();
                    }
                });
            }

            // Возвращение
            const btnReturnToday = document.getElementById('btnReturnToday');
            if (btnReturnToday) {
                btnReturnToday.addEventListener('click', () => {
                    state.phase = 'daily';
                    state.currentDay = getTodayDayNumber();
                    state.lastActiveDate = new Date().toISOString().split('T')[0];
                    saveState(state);
                    render();
                });
            }
            const btnReturnLast = document.getElementById('btnReturnLast');
            if (btnReturnLast) {
                btnReturnLast.addEventListener('click', () => {
                    const lastDay = Object.keys(state.days).map(Number).sort((a, b) => b - a)[0];
                    if (lastDay && state.days[lastDay]) {
                        showReviewModal(lastDay, state.days[lastDay]);
                    } else {
                        state.phase = 'daily';
                        state.currentDay = getTodayDayNumber();
                        state.lastActiveDate = new Date().toISOString().split('T')[0];
                        saveState(state);
                        render();
                    }
                });
            }

            // Итоги
            const btnShowSummary = document.getElementById('btnShowSummary');
            if (btnShowSummary) {
                btnShowSummary.addEventListener('click', () => {
                    state.phase = 'completed';
                    saveState(state);
                    render();
                });
            }

            // Шаринг с Катей
            const btnShareToday = document.getElementById('btnShareToday');
            if (btnShareToday) {
                btnShareToday.addEventListener('click', () => shareToday());
            }
            const btnShareSummary = document.getElementById('btnShareSummary');
            if (btnShareSummary) {
                btnShareSummary.addEventListener('click', () => shareSummary());
            }

            // PDF
            const btnSavePDF = document.getElementById('btnSavePDF');
            if (btnSavePDF) {
                btnSavePDF.addEventListener('click', () => saveAsPDF());
            }

            // Новый цикл
            const btnNewCycle = document.getElementById('btnNewCycle');
            if (btnNewCycle) {
                btnNewCycle.addEventListener('click', () => {
                    state.completedCycles++;
                    state.phase = 'set_goal';
                    state.goal = '';
                    state.startDate = new Date().toISOString().split('T')[0];
                    state.currentDay = 1;
                    state.days = {};
                    state.weeklyIdentity = {};
                    state.gratitudeGarden = [];
                    state.goalHistory = [];
                    saveState(state);
                    render();
                });
            }
            const btnContinueCycle = document.getElementById('btnContinueCycle');
            if (btnContinueCycle) {
                btnContinueCycle.addEventListener('click', () => {
                    state.completedCycles++;
                    state.phase = 'daily';
                    state.startDate = new Date().toISOString().split('T')[0];
                    state.currentDay = 1;
                    state.days = {};
                    state.weeklyIdentity = {};
                    state.gratitudeGarden = [];
                    saveState(state);
                    render();
                });
            }
            const btnExit = document.getElementById('btnExit');
            if (btnExit) {
                btnExit.addEventListener('click', () => {
                    saveAsPDF();
                    alert(
                        'Твоя карта пути сохранена. Навигатор будет ждать тебя, когда ты решишь вернуться. Спокойного пути, ' +
                        (state.wandererName || 'Путник') + '. 🤍');
                });
            }
        }

        function updateHeavyFeelingContainer() {
            const container = document.getElementById('heavyFeelingContainer');
            if (!container) return;
            const selectedFeelings = [...document.querySelectorAll('#feelingsGrid .feeling-chip.selected')].map(c => c.dataset
                .feeling);
            const heavySelected = selectedFeelings.filter(fid => HEAVY_FEELINGS[fid]);

            if (heavySelected.length > 0) {
                const fid = heavySelected[0];
                const hf = HEAVY_FEELINGS[fid];
                container.innerHTML = `
                    <div class="container-box">
                        <h4>${hf.title}</h4>
                        <p>${hf.body}</p>
                        <p><strong>${hf.truth}</strong></p>
                        <p class="note">${hf.note}</p>
                        <a href="https://t.me/ginger_coach4you" target="_blank" class="btn btn-outline btn-sm mt-8" style="display:inline-block;">
                            Мне нужно больше поддержки
                        </a>
                    </div>
                `;
            } else {
                container.innerHTML = '';
            }
        }

        function showReviewModal(dayNumber, data) {
            const f = data.feelings ? data.feelings.map(fid => FEELINGS.find(ff => ff.id === fid)).filter(Boolean) : [];
            const modalHTML = `
                <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;" id="reviewModal">
                    <div style="background:#fff;border-radius:var(--radius);padding:20px;max-width:450px;width:100%;max-height:80vh;overflow-y:auto;">
                        <h3>День ${dayNumber} — ${formatDate(dayNumber)}</h3>
                        <p><strong>Приближение:</strong> ${data.scale}/10</p>
                        ${f.length > 0 ? `<p><strong>Чувства:</strong> ${f.map(ff => ff.emoji + ' ' + ff.name).join(', ')}</p>` : ''}
                        ${data.thought ? `<p><strong>Мысль дня:</strong> ${escapeHtml(data.thought)}</p>` : ''}
                        ${data.thoughtCheck ? `<p><strong>Факт или интерпретация:</strong> ${escapeHtml(data.thoughtCheck)}</p>` : ''}
                        ${data.thoughtAlt ? `<p><strong>Альтернативный взгляд:</strong> ${escapeHtml(data.thoughtAlt)}</p>` : ''}
                        ${data.helped ? `<p><strong>Что приблизило:</strong> ${escapeHtml(data.helped)}</p>` : ''}
                        ${data.hindered ? `<p><strong>Что отдалило:</strong> ${escapeHtml(data.hindered)}</p>` : ''}
                        ${data.insight ? `<p><strong>💡 Инсайт:</strong> ${escapeHtml(data.insight)}</p>` : ''}
                        ${data.win ? `<p><strong>🌟 Победа:</strong> ${escapeHtml(data.win)}</p>` : ''}
                        ${data.selfSupport ? `<p><strong>🤲 Самоподдержка:</strong> ${escapeHtml(data.selfSupport)}</p>` : ''}
                        ${data.sessionNote ? `<p><strong>💬 На сессию с Катей:</strong> ${escapeHtml(data.sessionNote)}</p>` : ''}
                        <button class="btn btn-primary mt-12" onclick="document.getElementById('reviewModal').remove()">Закрыть</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            document.getElementById('reviewModal').addEventListener('click', function(e) {
                if (e.target === this) this.remove();
            });
        }

        function shareToday() {
            const today = getTodayDayNumber();
            const data = state.days[today];
            if (!data) return;
            const text = buildDayShareText(today, data);
            shareToTelegram(text);
            state.sharingHistory.push({ type: 'day', day: today, date: new Date().toISOString() });
            saveState(state);
        }

        function shareSummary() {
            const text = buildSummaryShareText();
            shareToTelegram(text);
            state.sharingHistory.push({ type: 'summary', date: new Date().toISOString() });
            saveState(state);
        }

        function buildDayShareText(dayNumber, data) {
            const f = data.feelings ? data.feelings.map(fid => FEELINGS.find(ff => ff.id === fid)).filter(Boolean) : [];
            let text = `🧭 ${state.wandererName || 'Путник'}, ${formatDate(dayNumber)}\n\n`;
            text += `Приближение к цели: ${data.scale}/10\n`;
            if (f.length > 0) text += `Чувства: ${f.map(ff => ff.emoji + ' ' + ff.name).join(', ')}\n`;
            if (data.insight) text += `\n💡 Инсайт: ${data.insight}\n`;
            if (data.win) text += `\n🌟 Победа: ${data.win}\n`;
            if (data.sessionNote) text += `\n💬 На сессию: ${data.sessionNote}\n`;
            text += `\n— Навигатор моего пути`;
            return text;
        }

        function buildSummaryShareText() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));
            const scales = allDays.map(d => d.scale || 0);
            const avgScale = scales.length > 0 ? Math.round(scales.reduce((a, b) => a + b, 0) / scales.length) : 0;
            const insights = allDays.filter(d => d.insight).map(d => d.insight).slice(-3);

            let text = `🌟 ${state.wandererName || 'Путник'}, мой путь за месяц\n\n`;
            text += `Пройдено дней: ${progress.completed} из ${state.totalDays}\n`;
            text += `Среднее приближение: ${avgScale}/10\n`;
            text += `Старт: ${scales.length > 0 ? scales[0] : '—'}/10 → Финиш: ${scales.length > 0 ? scales[scales.length - 1] : '—'}/10\n`;
            if (insights.length > 0) {
                text += `\n💡 Ключевые инсайты:\n`;
                insights.forEach((ins, i) => { text += `${i+1}. ${ins}\n`; });
            }
            if (Object.keys(state.weeklyIdentity).length > 0) {
                const lastIdentity = Object.entries(state.weeklyIdentity).sort((a, b) => parseInt(b[0]) - parseInt(a[0]))[0];
                text += `\n🪞 Кто я сейчас: ${lastIdentity[1]}\n`;
            }
            text += `\n— Навигатор моего пути`;
            return text;
        }

        function shareToTelegram(text) {
            const encoded = encodeURIComponent(text);
            const url = `https://t.me/ginger_coach4you?text=${encoded}`;
            window.open(url, '_blank');
        }

        function saveAsPDF() {
            const progress = getProgress();
            const allDays = Object.entries(state.days).map(([day, data]) => ({ day: parseInt(day), ...data }));
            const sortedDays = allDays.sort((a, b) => a.day - b.day);
            const scales = sortedDays.map(d => d.scale || 0);
            const avgScale = scales.length > 0 ? Math.round(scales.reduce((a, b) => a + b, 0) / scales.length) : 0;
            const insights = sortedDays.filter(d => d.insight).map(d => d.insight);
            const selfSupports = sortedDays.filter(d => d.selfSupport).map(d => d.selfSupport);
            const sessionNotes = sortedDays.filter(d => d.sessionNote).map(d => d.sessionNote);

            let html = `
                <html><head><meta charset="UTF-8"><title>Навигатор — Итоги пути</title>
                <style>
                    body { font-family: -apple-system, sans-serif; color: #3a3a3a; padding: 20px; max-width: 500px; margin: 0 auto; line-height: 1.6; }
                    h1 { color: #4a7c96; font-size: 20px; text-align: center; }
                    h2 { color: #4a7c96; font-size: 16px; margin-top: 16px; border-bottom: 1px solid #e8e4dd; padding-bottom: 4px; }
                    .emoji { font-size: 40px; text-align: center; }
                    p { margin: 6px 0; }
                    .section { background: #fafaf9; padding: 10px; border-radius: 8px; margin: 8px 0; }
                </style></head><body>
                <div class="emoji">${state.wandererEmoji || '🧭'}</div>
                <h1>${state.wandererName || 'Путник'} — карта пути</h1>
                <p style="text-align:center;color:#7a7a7a;">${state.goal || 'Цель не указана'}</p>
                ${state.values.length > 0 ? `<p style="text-align:center;">🧭 Компас: ${state.values.join(' • ')}</p>` : ''}
                <h2>📊 Цифры</h2>
                <p>Пройдено: ${progress.completed} из ${state.totalDays} | Среднее приближение: ${avgScale}/10</p>
                <p>Старт: ${scales.length > 0 ? scales[0] : '—'}/10 → Финиш: ${scales.length > 0 ? scales[scales.length - 1] : '—'}/10</p>
                ${insights.length > 0 ? `<h2>💡 Инсайты</h2>${insights.map(i => `<div class="section">${escapeHtml(i)}</div>`).join('')}` : ''}
                ${Object.keys(state.weeklyIdentity).length > 0 ? `<h2>🪞 Кто я сейчас</h2>${Object.entries(state.weeklyIdentity).sort((a,b) => parseInt(a[0]) - parseInt(b[0])).map(([w,t]) => `<div class="section"><strong>Неделя ${w}:</strong> ${escapeHtml(t)}</div>`).join('')}` : ''}
                ${selfSupports.length > 0 ? `<h2>🤲 Самоподдержка</h2>${selfSupports.slice(-5).map(s => `<div class="section">${escapeHtml(s)}</div>`).join('')}` : ''}
                ${sessionNotes.length > 0 ? `<h2>💬 На сессию с Катей</h2>${sessionNotes.map(s => `<div class="section">${escapeHtml(s)}</div>`).join('')}` : ''}
                ${state.gratitudeGarden.length > 0 ? `<h2>🌸 Сад благодарности</h2>${state.gratitudeGarden.map(g => `<div class="section"><strong>День ${g.dayNumber}:</strong> ${escapeHtml(g.text)}</div>`).join('')}` : ''}
                <p style="text-align:center;margin-top:20px;color:#7a7a7a;">🤍 Навигатор моего пути к цели</p>
                </body></html>
            `;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `navigator-itogi-${state.wandererName || 'putnik'}.html`;
            a.click();
            URL.revokeObjectURL(url);
            // Также открываем окно печати
            const printWindow = window.open('', '_blank');
            printWindow.document.write(html);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 500);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================

        // Если это первый запуск после создания путника — определяем фазу
        if (state.phase === 'daily' && state.currentDay > state.totalDays) {
            state.phase = 'completed';
        }

        render();
    </script>
</body>
</html>
